services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ${ZENITH_DATA_PATH:-./backend/data}:/app/backend/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${ZENITH_PORT:-80}:80"
    depends_on:
      - backend
